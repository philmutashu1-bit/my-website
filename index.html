<!DOCTYPE html>
<html>
<head>
  <title>O Level Study Hub</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(-45deg, #4facfe, #00f2fe, #43e97b, #38f9d7);
      background-size: 400% 400%;
      animation: bg 10s ease infinite;
      color: white;
      text-align: center;
    }

    @keyframes bg {
      0% {background-position: 0% 50%;}
      50% {background-position: 100% 50%;}
      100% {background-position: 0% 50%;}
    }

    .box {
      margin-top: 80px;
    }

    h1 {
      font-size: 45px;
      margin-bottom: 10px;
      text-shadow: 2px 2px 10px rgba(0,0,0,0.3);
    }

    .welcome {
      font-size: 18px;
      margin-bottom: 30px;
      opacity: 0.9;
    }

    .card {
      background: rgba(255,255,255,0.15);
      backdrop-filter: blur(10px);
      padding: 20px;
      margin: 20px auto;
      width: 320px;
      border-radius: 15px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.2);
      transition: 0.3s;
    }

    .card:hover {
      transform: scale(1.05);
    }

    a {
      display: inline-block;
      padding: 12px 18px;
      margin: 10px;
      background: white;
      color: black;
      text-decoration: none;
      border-radius: 10px;
      font-weight: bold;
      transition: 0.3s;
    }

    a:hover {
      background: black;
      color: white;
    }

    .emoji {
      font-size: 50px;
    }
  </style>
</head>

<body>

  <div class="box">

    <div class="emoji">📚</div>
    <h1>O Level Study Hub</h1>

    <div class="welcome">
      Welcome 👋<br>
      Your notes, past papers, and resources are all in one place.
    </div>

    <div class="card">
      <p>Quick Access</p>

      <a href="specimen.html">📄 Specimen Papers</a>
      <a href="contact.html">📞 Contact</a>
    </div>

  </div>

</body>
</html>
