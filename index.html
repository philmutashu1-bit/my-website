<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>O Level Student Website | Contact Me</title>

  <meta name="description" content="A simple student website where users can send messages directly via contact form. Built for O Level project.">

  <style>
    body {
      font-family: Arial;
      margin: 0;
      background: linear-gradient(135deg, #4facfe, #00f2fe);
      text-align: center;
      color: #333;
    }

    .container {
      background: white;
      max-width: 500px;
      margin: 80px auto;
      padding: 25px;
      border-radius: 15px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    }

    input, textarea {
      width: 90%;
      padding: 10px;
      margin: 10px 0;
    }

    button {
      padding: 10px 20px;
      background: #4facfe;
      border: none;
      color: white;
      cursor: pointer;
      border-radius: 8px;
    }
  </style>
</head>

<body>

<div class="container">

  <h1>My Student Website</h1>

  <p>This website is made for my O Level project. You can send me a message below.</p>

  <form action="https://api.web3forms.com/submit" method="POST">

    <input type="hidden" name="access_key" value="PASTE_YOUR_ACCESS_KEY_HERE">

    <input type="email" name="email" placeholder="Your Email" required>
    <br>

    <textarea name="message" placeholder="Your Message" required></textarea>
    <br>

    <button type="submit">Send Message</button>

  </form>

</div>

</body>
</html>
