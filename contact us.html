<!DOCTYPE html>
<html>
<head>
  <title>Contact - O Level Study Hub</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: linear-gradient(135deg, #667eea, #764ba2);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .box {
      background: white;
      padding: 25px;
      border-radius: 15px;
      width: 350px;
      text-align: center;
    }

    input, textarea {
      width: 90%;
      padding: 10px;
      margin: 10px 0;
    }

    button {
      background: #667eea;
      color: white;
      padding: 10px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }

    a {
      display: block;
      margin-top: 10px;
      text-decoration: none;
      color: #667eea;
    }
  </style>
</head>

<body>

  <div class="box">

    <h2>📞 Contact Me</h2>

    <form action="https://api.web3forms.com/submit" method="POST">

      <input type="hidden" name="access_key" value="a2d155e8-b9ef-43cb-abfc-7348590f3dc4">

      <input type="email" name="email" placeholder="Your Email" required>

      <textarea name="message" placeholder="Your Message" required></textarea>

      <button type="submit">Send Message</button>

    </form>

    <a href="index.html">⬅ Back Home</a>

  </div>

</body>
</html>
